name: Train Chiles title generator

# Requires a GPU runner with 8+ GB VRAM.
# Options:
#   - Self-hosted: add a runner with label "gpu" and set runs-on below
#   - GitHub-hosted GPU runners (paid): change runs-on to e.g. "ubuntu-latest-gpu"
# Also requires a HuggingFace token (HF_TOKEN secret) with access to
# google/gemma-2-2b-it (accept the licence at hf.co/google/gemma-2-2b-it first).

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1"   # every Monday at 07:00 UTC (one hour after the scrape)

permissions:
  contents: write

jobs:
  train:
    runs-on: [self-hosted, gpu]
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install torch transformers peft trl datasets accelerate

      - name: Train model and generate titles
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python train.py

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add generated.txt
          git diff --staged --quiet || git commit -m "chore: regenerate titles [skip ci]"
          git push
