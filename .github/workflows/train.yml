name: Train Chiles title generator

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1"   # every Monday at 07:00 UTC (one hour after the scrape)

permissions:
  contents: write

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install scraper dependency
        run: pip install requests

      - name: Scrape fresh titles
        run: |
          if [ -n "$GUARDIAN_API_KEY" ]; then
            python scrape.py --api-key "$GUARDIAN_API_KEY" --output titles.txt
          else
            python scrape.py --output titles.txt
          fi
        env:
          GUARDIAN_API_KEY: ${{ secrets.GUARDIAN_API_KEY }}

      - name: Train model and generate titles
        run: python train.py

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add titles.txt model.pkl generated.txt
          git diff --staged --quiet || git commit -m "chore: retrain model and regenerate titles [skip ci]"
          git push
