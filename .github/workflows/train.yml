name: Train Chiles title generator

# Pure-Python microgpt — no GPU or external ML libraries required.
# Runs on free ubuntu-latest GitHub-hosted runners.

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1"   # every Monday at 07:00 UTC (one hour after the scrape)

permissions:
  contents: write

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Train model and generate titles
        run: python train.py

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add generated.txt model.pkl
          git diff --staged --quiet || git commit -m "chore: regenerate titles [skip ci]"
          git push
